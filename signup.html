<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Style Corner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
</head>

<body class="page-auth">
    <div class="split-page-container">
        <!-- Visual Side -->
        <div class="split-side split-side-image image-side-text"
            style="background-image: url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1200&q=70&fm=webp');">
            <div class="side-content fade-up">
                <span class="side-sub">Find Your Style</span>
                <h2>The Client</h2>
                <p>Get professional styling and care made just for you.</p>
                <a href="signup.html?role=user" class="btn btn-premium">Sign Up</a>
            </div>
            <div class="side-bg-overlay"></div>
        </div>

        <!-- Form Side -->
        <div class="split-side split-side-form">
            <div class="form-wrapper-minimal fade-up" style="animation-delay: 0.3s;">
                <a href="index.html" class="logo mb-5" style="display: inline-block;">STYLE<span>CORNER</span></a>
                <div id="role-indicator" class="side-sub" style="margin-bottom: 0.5rem; color: var(--accent);">CLIENT
                    ACCESS</div>
                <h1>Create Account</h1>
                <p class="subtitle">Enter your details to create your account.</p>

                <form id="signup-form">
                    <div class="form-row"
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>First Name</label>
                            <input type="text" id="firstname" placeholder="First Name" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Last Name</label>
                            <input type="text" id="lastname" placeholder="Last Name" required>
                        </div>
                    </div>
                    <div class="form-group mb-4">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group mb-4">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="+234..." required>
                    </div>
                    <div class="form-group mb-4">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group" id="services-group"
                        style="display: none; margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                        <label style="color: var(--accent);">Your Specialties (Max 3)</label>
                        <div class="services-list"
                            style="display: grid; grid-template-columns: 1fr; gap: 0.5rem; margin-top: 1rem;">
                            <!-- JS will inject or existing inputs preserved -->
                            <label style="display: flex; gap: 0.8rem; font-size: 0.85rem; cursor: pointer;"><input
                                    type="checkbox" name="services" value="Hair Cut Services"> Cuts / Barbering</label>
                            <label style="display: flex; gap: 0.8rem; font-size: 0.85rem; cursor: pointer;"><input
                                    type="checkbox" name="services" value="Hair Braiding Services"> Braiding /
                                Twists</label>
                            <label style="display: flex; gap: 0.8rem; font-size: 0.85rem; cursor: pointer;"><input
                                    type="checkbox" name="services" value="Nails"> Professional Nails</label>
                            <label style="display: flex; gap: 0.8rem; font-size: 0.85rem; cursor: pointer;"><input
                                    type="checkbox" name="services" value="Wig Installation"> Wig Artistry</label>
                            <label style="display: flex; gap: 0.8rem; font-size: 0.85rem; cursor: pointer;"><input
                                    type="checkbox" name="services" value="Lash & Nails Combo"> Combo Services</label>
                        </div>
                        <p id="services-error"
                            style="color: #ef4444; font-size: 0.75rem; margin-top: 0.8rem; display: none;">Select up to
                            3 specialties.</p>
                    </div>

                    <button type="submit" class="btn btn-premium w-full mt-5">Create Account</button>
                </form>

                <div class="auth-footer mt-5" style="border-top: 1px solid var(--border); padding-top: 2rem;">
                    <p style="font-size: 0.9rem; color: var(--text-muted);">Already a member? <a href="login.html"
                            style="color: var(--accent); font-weight: 600;">Sign In</a></p>
                    <p class="mt-2 text-center"><a href="role-selection.html"
                            style="font-size: 0.8rem; opacity: 0.6;">Change role registration</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role') || 'customer';
            const indicator = document.getElementById('role-indicator');
            indicator.textContent = role === 'staff' ? 'Staff Account' : 'Client Account';

            const servicesGroup = document.getElementById('services-group');
            const checkboxes = document.querySelectorAll('input[name="services"]');
            const servicesError = document.getElementById('services-error');

            if (role === 'staff') {
                servicesGroup.style.display = 'block';

                // Enforce max 3 services logic
                checkboxes.forEach(box => {
                    box.addEventListener('change', () => {
                        const checkedCount = document.querySelectorAll('input[name="services"]:checked').length;
                        if (checkedCount > 3) {
                            box.checked = false;
                            servicesError.style.display = 'block';
                        } else {
                            servicesError.style.display = 'none';
                        }
                    });
                });
            }

            const form = document.getElementById('signup-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const selectedServices = Array.from(document.querySelectorAll('input[name="services"]:checked')).map(cb => cb.value).join(',');

                if (role === 'staff' && !selectedServices) {
                    alert('Please select at least one specialty.');
                    return;
                }

                const btn = form.querySelector('button');
                btn.disabled = true;
                btn.textContent = 'Making Account...';

                const data = {
                    role,
                    firstname: document.getElementById('firstname').value,
                    lastname: document.getElementById('lastname').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    password: document.getElementById('password').value,
                    services: role === 'staff' ? selectedServices : ''
                };

                try {
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    const result = await res.json();

                    if (!res.ok) {
                        alert(result.error || 'Registration failed');
                        btn.disabled = false;
                        btn.textContent = 'Create Account';
                        return;
                    }

                    window.location.href = `verify.html?email=${encodeURIComponent(data.email)}`;
                } catch (error) {
                    console.error(error);
                    alert('Server error during registration');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            });
        });
    </script>
</body>

</html>
