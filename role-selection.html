<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Salon | Style Corner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
</head>

<body class="page-auth">
    <div class="split-page-container">
        <!-- Client Path -->
        <div class="split-side split-side-image image-side-text"
            style="background-image: url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1200&q=80');">
            <div class="side-content fade-up">
                <span class="side-sub">Find Your Style</span>
                <h2>The Client</h2>
                <p>Get professional styling and care made just for you.</p>
                <a href="signup.html?role=user" class="btn btn-premium">Sign Up</a>
            </div>
            <div class="side-bg-overlay"></div>
        </div>

        <!-- Expert Path -->
        <div class="split-side split-side-image image-side-text"
            style="background-image: url('https://images.unsplash.com/photo-1618077360395-f3068be8e001?auto=format&fit=crop&w=1200&q=80');">
            <div class="side-content fade-up" style="animation-delay: 0.3s;">
                <span class="side-sub">Our Team</span>
                <h2>The Expert</h2>
                <p>Join our group of great experts and show your skills.</p>
                <a href="signup.html?role=staff" class="btn btn-premium">Sign Up as Expert</a>
            </div>
            <div class="side-bg-overlay"></div>
        </div>

        <!-- Branding & Navigation -->
        <div class="floating-brand">
            <a href="index.html" class="logo">STYLE<span>CORNER</span></a>
        </div>

        <div class="absolute-footer">
            <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <script src="js/common.js"></script>
</body>

</html>
